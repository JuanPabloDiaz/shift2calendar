    <script>
      // ── CONFIG ────────────────────────────────────────────────────────────
      const GOOGLE_CLIENT_ID = "19286324149-5oje1gclta6vpgs88rogvcp33h1pno0r.apps.googleusercontent.com";
      const SHEET_ID         = "1nozoAVbXK3qoahczhQnOonOE4EQj3OA5vjmUf-5itKY";
      const SCOPES           = "https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/spreadsheets";
      const OWNER_NAME       = "Diaz, Juan";
      const REMINDER_FIXED   = 30; // always-on reminder in minutes

      // ── TRANSLATIONS ──────────────────────────────────────────────────────
      const T = {
        es: {
          subtitle:"Convierte tu horario en eventos de calendario",

          optWeeklyLabel:"Total de horas en descripción",
          optRateLabel:"Tarifa por hora",
          generateBtn:"Generar y descargar .ics",
          previewTitle:"Turnos detectados:", weeklyLabel:"Total semana:",
          errEmpty:"Pega el JSON de AI primero.", errJson:"JSON inválido: ", errJsonHint:". Asegúrate de copiar el bloque completo.",
          errNoShifts:"No se encontraron turnos en el JSON.", successMsg:"Descargado: ", clearBtn:"Limpiar turnos",
          descShift:"Turno Costco", descHours:"Horas hoy", descWeekTotal:"Total semana", descWeekDays:"días esta semana",
          juanDivider:"Solo para Juan Diaz",
          googleSignin:"Conectar Google", signout:"Cerrar sesión",
          sendCalendar:"Calendar", sendSheets:"Sheets", sendBoth:"Ambos",
          googleLoading:"Procesando...",
          googleCalOk:"Eventos creados en Google Calendar",
          googleSheetsOk:"Datos guardados en Google Sheets",
          googleBothOk:"Calendar y Sheets actualizados",
          googleErr:"Error: ",
          sheetsDupTitle:"Semana existente",
          sheetsDupMsg:"Esta semana ya existe en el Sheet. ¿Sobreescribir?",
          sheetsDupYes:"Sobreescribir", sheetsDupNo:"Cancelar",
          calSkipped:" — duplicados omitidos.", cancelled:"Cancelado.",
          autoConnecting:"Conectando...",
        },
        en: {
          subtitle:"Convert your schedule into calendar events",
          step1Title:"Image type", step1Desc:"What type of image are you using?",
          imgModePrinted:"Printed schedule", imgModeKronos:"Kronos app",
          step2Title:"Your name on the schedule", step2Desc:"Type your name exactly as it appears in the image",
          nameLabel:"Name (Last, First)",
          step3Title:"Copy the prompt", step3Desc:"Open ChatGPT or Claude, paste this prompt and attach the photo",
          copyBtn:"Copy prompt", copiedBtn:"Copied!",
          step4Title:"Paste the JSON here", step4Desc:"Copy AI's response and paste it below",
          step5Title:"Customize events", step5Desc:"Additional info for each calendar event",
          optLocationLabel:"Location",
          optReminder1Label:"Fixed reminder",
          optReminder2Label:"Additional reminder",
          optReminderNone:"No reminder",
          optWeeklyLabel:"Weekly hours total in description",
          optRateLabel:"Hourly rate",
          generateBtn:"Generate & download .ics",
          previewTitle:"Detected shifts:", weeklyLabel:"Week total:",
          errEmpty:"Paste AI's JSON first.", errJson:"Invalid JSON: ", errJsonHint:". Make sure you copied the full block.",
          errNoShifts:"No shifts found in the JSON.", successMsg:"Downloaded: ", clearBtn:"Clear shifts",
          descShift:"Costco Shift", descHours:"Hours today", descWeekTotal:"Week total", descWeekDays:"days this week",
          juanDivider:"Juan Diaz only",
          googleSignin:"Connect Google", signout:"Sign out",
          sendCalendar:"Calendar", sendSheets:"Sheets", sendBoth:"Both",
          googleLoading:"Processing...",
          googleCalOk:"Events created in Google Calendar",
          googleSheetsOk:"Data saved to Google Sheets",
          googleBothOk:"Calendar and Sheets updated",
          googleErr:"Error: ",
          sheetsDupTitle:"Week already exists",
          sheetsDupMsg:"This week already exists in the Sheet. Overwrite?",
          sheetsDupYes:"Overwrite", sheetsDupNo:"Cancel",
          calSkipped:" — duplicates skipped.", cancelled:"Cancelled.",
          autoConnecting:"Connecting...",
        },
      };

      const DAYS_ES   = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
      const MONTHS_ES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
      const DAYS_EN   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const MONTHS_EN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

      let lang         = "en";
      let theme        = localStorage.getItem("theme") || "light";
      let inputMode    = "json";
      let imageMode    = "printed";
      let manualShifts = [];
      let accessToken  = null;
      let tokenClient  = null;

      // ── SILENT SIGN-IN / AUTO RECONNECT ──────────────────────────────────
      // We wait for the GSI library to load, then attempt silent sign-in
      // if the user has previously authorized.
      window.addEventListener("load", () => {
        // Give GSI library time to initialize
        const tryAutoConnect = () => {
          if (typeof google === "undefined" || !google.accounts) {
            setTimeout(tryAutoConnect, 300);
            return;
          }
          initTokenClient();
          // If previously connected, attempt silent token refresh
          if (localStorage.getItem("gsi_connected") === "1" && isJuan()) {
            showGoogleStatus("loading", T[lang].autoConnecting);
            tokenClient.requestAccessToken({ prompt: "" }); // empty prompt = silent
          }
        };
        tryAutoConnect();
      });

      function initTokenClient() {
        if (tokenClient) return;
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: SCOPES,
          callback: async (response) => {
            if (response.error) {
              // Silent auth failed — clear stored state and show sign-in button
              localStorage.removeItem("gsi_connected");
              document.getElementById("googleStatus").style.display = "none";
              return;
            }
            accessToken = response.access_token;
            localStorage.setItem("gsi_connected", "1");
            const info = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
              headers: { Authorization: "Bearer " + accessToken }
            }).then(r => r.json()).catch(() => ({}));
            document.getElementById("signedInEmail").textContent = info.email || "Connected";
            document.getElementById("googleSignedOut").style.display = "none";
            document.getElementById("googleSignedIn").style.display  = "block";
            document.getElementById("googleStatus").style.display    = "none";
          },
        });
      }

      function signInWithGoogle() {
        initTokenClient();
        tokenClient.requestAccessToken({ prompt: "consent" });
      }

      function signOut() {
        if (accessToken) { google.accounts.oauth2.revoke(accessToken, () => {}); accessToken = null; }
        localStorage.removeItem("gsi_connected");
        document.getElementById("googleSignedOut").style.display = "block";
        document.getElementById("googleSignedIn").style.display  = "none";
        document.getElementById("googleStatus").style.display    = "none";
      }

      function isJuan() {
        return document.getElementById("employeeName").value.trim() === OWNER_NAME;
      }
      function onNameInput() { updatePrompt(); checkJuanSection(); }
      function checkJuanSection() {
        const juan = isJuan();
        document.getElementById("juanSection").style.display   = juan ? "block" : "none";
        document.getElementById("hourlyRateRow").style.display = juan ? "flex"  : "none";
      }

      // ── RESET / CLEAR ─────────────────────────────────────────────────────
      function resetAfterAction() {
        document.getElementById("jsonInput").value = "";
        manualShifts = [];
        renderManualShifts();
      }

      // ── PARSE SHIFTS ──────────────────────────────────────────────────────
      function parseAndValidate() {
        const t = T[lang];
        let shifts, period;
        if (inputMode === "manual") {
          if (!manualShifts.length) { showError(t.errNoShifts); return null; }
          shifts = manualShifts; period = "costco";
        } else {
          let raw = document.getElementById("jsonInput").value.trim();
          if (!raw) { showError(t.errEmpty); return null; }
          raw = fixQuotes(raw);
          const match = raw.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
          if (match) raw = match[0];
          let data;
          try { data = JSON.parse(raw); }
          catch (e) { showError(t.errJson + e.message + t.errJsonHint); return null; }
          if (Array.isArray(data)) { shifts = data; period = "costco"; }
          else { shifts = data.shifts || []; period = data.period || "costco"; }
          if (!shifts.length) { showError(t.errNoShifts); return null; }
        }
        return { shifts, period };
      }

      // ── REMINDER HELPERS ──────────────────────────────────────────────────
      function getReminderOverrides() {
        const overrides = [{ method: "popup", minutes: REMINDER_FIXED }, { method: "email", minutes: REMINDER_FIXED }];
        const extra = parseInt(document.getElementById("reminderSelect").value);
        if (extra > 0) {
          overrides.push({ method: "popup", minutes: extra });
          overrides.push({ method: "email", minutes: extra });
        }
        return overrides;
      }

      // ── GOOGLE CALENDAR ───────────────────────────────────────────────────
      async function sendToGoogleCalendar() {
        const parsed = parseAndValidate(); if (!parsed) return;
        const ok = await _doCalendar(parsed.shifts, parsed.period);
        if (ok !== false) { renderPreview(parsed.shifts); resetAfterAction(); }
      }

      async function _doCalendar(shifts, period) {
        const t = T[lang];
        showGoogleStatus("loading", t.googleLoading);
        const merged         = mergeShifts(shifts);
        const totalWeekHours = merged.reduce((a, s) => a + parseFloat(s.hours), 0);
        const totalWeekDays  = merged.length;
        const location       = document.getElementById("locationSelect").value;
        const includeWeekly  = document.getElementById("weeklyToggle").checked;
        const locEl          = document.getElementById("locationSelect");
        const locLabel       = locEl.options[locEl.selectedIndex].text;
        const reminderOverrides = getReminderOverrides();

        let skipped = 0;
        for (const s of merged) {
          const dayStart = s.date + "T00:00:00-05:00";
          const dayEnd   = s.date + "T23:59:59-05:00";
          const chk = await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(dayStart)}&timeMax=${encodeURIComponent(dayEnd)}&q=Costco`,
            { headers: { Authorization: "Bearer " + accessToken } }
          ).then(r => r.json());
          if (chk.items && chk.items.some(e => e.summary === "Costco")) { skipped++; continue; }

          let description = `${t.descShift}\n⏱ ${t.descHours}: ${s.hours} hrs`;
          if (includeWeekly) description += `\n📅 ${t.descWeekTotal}: ${totalWeekHours.toFixed(2)} hrs (${totalWeekDays} ${t.descWeekDays})`;
          description += `\n📍 ${locLabel}\n📆 ${period}`;

          const event = {
            summary: "Costco", location, description,
            start: { dateTime: s.startDt.toISOString(), timeZone: "America/New_York" },
            end:   { dateTime: s.endDt.toISOString(),   timeZone: "America/New_York" },
            colorId: "3",
            reminders: { useDefault: false, overrides: reminderOverrides },
          };

          const res = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events", {
            method: "POST",
            headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
            body: JSON.stringify(event),
          });
          if (!res.ok) {
            const err = await res.json();
            showGoogleStatus("error", t.googleErr + (err.error?.message || res.status));
            return false;
          }
        }
        showGoogleStatus("success", t.googleCalOk + (skipped > 0 ? t.calSkipped : ""));
        return true;
      }

      // ── GOOGLE SHEETS ─────────────────────────────────────────────────────
      async function sendToSheets() {
        const parsed = parseAndValidate(); if (!parsed) return;
        const ok = await _doSheets(parsed.shifts, parsed.period);
        if (ok !== false) { renderPreview(parsed.shifts); resetAfterAction(); }
      }

      // ── PAY CALCULATOR ────────────────────────────────────────────────────
      function calcPay(merged) {
        const rate     = parseFloat(document.getElementById("hourlyRate")?.value || 20);
        const sunRate  = rate * 1.5;
        let regHrs = 0, sunHrs = 0;
        merged.forEach(s => {
          const h = parseFloat(s.hours);
          if (new Date(s.date + "T00:00:00").getDay() === 0) sunHrs += h;
          else regHrs += h;
        });
        return { rate, sunRate, regHrs, sunHrs,
          totalHrs : regHrs + sunHrs,
          regPay   : regHrs * rate,
          sunPay   : sunHrs * sunRate,
          totalPay : regHrs * rate + sunHrs * sunRate };
      }

      // ── SHEETS: create/find tab ────────────────────────────────────────────
      async function getOrCreateTab(title) {
        const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`,
          { headers:{ Authorization:"Bearer "+accessToken } }).then(r=>r.json());
        const existing = meta.sheets.find(s => s.properties.title === title);
        if (existing) return existing.properties.sheetId;
        const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`, {
          method:"POST",
          headers:{ Authorization:"Bearer "+accessToken, "Content-Type":"application/json" },
          body: JSON.stringify({ requests:[{ addSheet:{ properties:{ title } } }] })
        }).then(r=>r.json());
        return res.replies?.[0]?.addSheet?.properties?.sheetId ?? null;
      }

      async function clearTab(sheetName) {
        await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!A1:Z200:clear`,
          { method:"POST", headers:{ Authorization:"Bearer "+accessToken, "Content-Type":"application/json" } }
        );
      }

      async function checkTabHasData(sheetName) {
        const res = await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(sheetName)}!A2`,
          { headers:{ Authorization:"Bearer "+accessToken } }).then(r=>r.json());
        return !!(res.values && res.values.length);
      }

      // ── SHEETS: write data + formatting ───────────────────────────────────
      async function _doSheets(shifts, period) {
        const t      = T[lang];
        const DAYS   = lang === "es" ? DAYS_ES : DAYS_EN;
        const MONTHS = lang === "es" ? MONTHS_ES : MONTHS_EN;
        const fmtT   = dt => { let h=dt.getHours(),m=dt.getMinutes(),ap=h>=12?"PM":"AM"; h=h%12||12; return `${h}:${String(m).padStart(2,"0")} ${ap}`; };

        showGoogleStatus("loading", t.googleLoading);
        const merged = mergeShifts(shifts);
        const pay    = calcPay(merged);

        // Get/create tab
        const tabId = await getOrCreateTab(period);
        if (tabId === null) { showGoogleStatus("error", t.googleErr + "Tab error"); return false; }

        // Check duplicate
        if (await checkTabHasData(period)) {
          const confirmed = await confirmDuplicate();
          if (!confirmed) { showGoogleStatus("info", t.cancelled); return false; }
          await clearTab(period);
        }

        // Build values: header row + shift rows + blank + summary block
        const header = [["Day", "Date", "Start", "End", "Hours", "Pay"]];

        const shiftRows = merged.map(s => {
          const d       = new Date(s.date + "T00:00:00");
          const isSun   = d.getDay() === 0;
          const hrs     = parseFloat(s.hours);
          const dayRate = isSun ? pay.sunRate : pay.rate;
          const dayPay  = hrs * dayRate;
          const dayLabel = `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}${isSun ? " ★" : ""}`;
          return [dayLabel, s.date, fmtT(s.startDt), fmtT(s.endDt), hrs, dayPay];
        });

        const blankRow  = [["", "", "", "", "", ""]];

        const summaryRows = [
          ["WEEK SUMMARY",  "",             "",  "",           "",           ""],
          ["Total hours",   "",             "",  "",           pay.totalHrs, ""],
          ["Regular hrs",   `$${pay.rate}/hr`,  "",  "",      pay.regHrs,   pay.regPay],
          ["Sunday hrs ★",  `$${pay.sunRate.toFixed(2)}/hr`, "", "", pay.sunHrs, pay.sunPay],
          ["",              "",             "",  "",           "",           ""],
          ["TOTAL PAY",     "",             "",  "",           "",           pay.totalPay],
        ];

        const allValues = [...header, ...shiftRows, ...blankRow, ...summaryRows];

        // Write values
        const enc = encodeURIComponent(period);
        const writeRes = await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${enc}!A1?valueInputOption=USER_ENTERED`,
          { method:"PUT", headers:{ Authorization:"Bearer "+accessToken, "Content-Type":"application/json" },
            body: JSON.stringify({ values: allValues }) }
        );
        if (!writeRes.ok) {
          const err = await writeRes.json();
          showGoogleStatus("error", t.googleErr + (err.error?.message || writeRes.status));
          return false;
        }

        // ── FORMATTING via batchUpdate ─────────────────────────────────────
        const nShifts     = shiftRows.length;
        const headerRow   = 0;                      // row index 0-based
        const firstShift  = 1;
        const lastShift   = nShifts;               // inclusive index
        const blankRowIdx = nShifts + 1;
        const summStart   = nShifts + 2;
        const totalPayRow = summStart + 5;

        // Zebra stripe colors
        const STRIPE_A  = { red:0.95, green:0.97, blue:1.0 };   // soft blue-white
        const STRIPE_B  = { red:1.0,  green:1.0,  blue:1.0 };   // white
        const HEADER_BG = { red:0.18, green:0.33, blue:0.59 };  // navy blue
        const HEADER_FG = { red:1.0,  green:1.0,  blue:1.0 };
        const SUN_BG    = { red:1.0,  green:0.95, blue:0.80 };  // warm yellow for sunday
        const SUMM_BG   = { red:0.95, green:0.95, blue:0.95 };  // light gray summary
        const TOTAL_BG  = { red:0.18, green:0.33, blue:0.59 };  // navy total row
        const TOTAL_FG  = { red:1.0,  green:1.0,  blue:1.0 };
        const GREEN     = { red:0.13, green:0.55, blue:0.13 };

        const cell = (r,c) => ({ sheetId: tabId, startRowIndex: r, endRowIndex: r+1, startColumnIndex: c, endColumnIndex: c+1 });
        const row  = (r, c1=0, c2=6) => ({ sheetId: tabId, startRowIndex: r, endRowIndex: r+1, startColumnIndex: c1, endColumnIndex: c2 });

        const requests = [];

        // Header row style
        requests.push({ repeatCell: { range: row(headerRow), cell: {
          userEnteredFormat: { backgroundColor: HEADER_BG, textFormat: { foregroundColor: HEADER_FG, bold: true, fontSize: 11 },
            horizontalAlignment: "CENTER", verticalAlignment: "MIDDLE" }
        }, fields: "userEnteredFormat" }});

        // Shift rows: zebra + sunday highlight
        merged.forEach((s, i) => {
          const r      = firstShift + i;
          const isSun  = new Date(s.date + "T00:00:00").getDay() === 0;
          const bg     = isSun ? SUN_BG : (i % 2 === 0 ? STRIPE_A : STRIPE_B);
          requests.push({ repeatCell: { range: row(r), cell: {
            userEnteredFormat: { backgroundColor: bg, textFormat: { fontSize: 10 },
              verticalAlignment: "MIDDLE" }
          }, fields: "userEnteredFormat" }});
          // Bold day name
          requests.push({ repeatCell: { range: cell(r, 0), cell: {
            userEnteredFormat: { textFormat: { bold: true } }
          }, fields: "userEnteredFormat.textFormat.bold" }});
          // Pay column green
          requests.push({ repeatCell: { range: cell(r, 5), cell: {
            userEnteredFormat: { textFormat: { foregroundColor: GREEN, bold: true },
              numberFormat: { type:"CURRENCY", pattern:"$#,##0.00" } }
          }, fields: "userEnteredFormat" }});
          // Hours center
          requests.push({ repeatCell: { range: cell(r, 4), cell: {
            userEnteredFormat: { horizontalAlignment: "CENTER" }
          }, fields: "userEnteredFormat.horizontalAlignment" }});
        });

        // Summary block rows
        [summStart, summStart+1, summStart+2, summStart+3].forEach(r => {
          requests.push({ repeatCell: { range: row(r), cell: {
            userEnteredFormat: { backgroundColor: SUMM_BG, textFormat: { fontSize: 10 } }
          }, fields: "userEnteredFormat" }});
        });
        // WEEK SUMMARY label — bold, larger
        requests.push({ repeatCell: { range: row(summStart), cell: {
          userEnteredFormat: { textFormat: { bold: true, fontSize: 11 }, backgroundColor: SUMM_BG }
        }, fields: "userEnteredFormat" }});
        // Numbers: hours col center, pay col green currency
        [summStart+1, summStart+2, summStart+3].forEach(r => {
          requests.push({ repeatCell: { range: cell(r, 4), cell: {
            userEnteredFormat: { horizontalAlignment: "CENTER", textFormat: { bold: true } }
          }, fields: "userEnteredFormat" }});
          requests.push({ repeatCell: { range: cell(r, 5), cell: {
            userEnteredFormat: { textFormat: { foregroundColor: GREEN, bold: true },
              numberFormat: { type:"CURRENCY", pattern:"$#,##0.00" } }
          }, fields: "userEnteredFormat" }});
        });
        // TOTAL PAY row — navy + white + large
        requests.push({ repeatCell: { range: row(totalPayRow), cell: {
          userEnteredFormat: { backgroundColor: TOTAL_BG,
            textFormat: { foregroundColor: TOTAL_FG, bold: true, fontSize: 12 },
            horizontalAlignment: "CENTER", verticalAlignment: "MIDDLE" }
        }, fields: "userEnteredFormat" }});
        requests.push({ repeatCell: { range: cell(totalPayRow, 5), cell: {
          userEnteredFormat: { numberFormat: { type:"CURRENCY", pattern:"$#,##0.00" },
            textFormat: { foregroundColor: TOTAL_FG, bold: true, fontSize: 12 } }
        }, fields: "userEnteredFormat" }});

        // Column widths
        const colWidths = [160, 100, 90, 90, 70, 90];
        colWidths.forEach((px, i) => {
          requests.push({ updateDimensionProperties: {
            range: { sheetId: tabId, dimension:"COLUMNS", startIndex: i, endIndex: i+1 },
            properties: { pixelSize: px }, fields: "pixelSize" }});
        });

        // Row heights
        requests.push({ updateDimensionProperties: {
          range: { sheetId: tabId, dimension:"ROWS", startIndex: headerRow, endIndex: headerRow+1 },
          properties: { pixelSize: 32 }, fields: "pixelSize" }});
        requests.push({ updateDimensionProperties: {
          range: { sheetId: tabId, dimension:"ROWS", startIndex: firstShift, endIndex: lastShift+1 },
          properties: { pixelSize: 26 }, fields: "pixelSize" }});
        requests.push({ updateDimensionProperties: {
          range: { sheetId: tabId, dimension:"ROWS", startIndex: totalPayRow, endIndex: totalPayRow+1 },
          properties: { pixelSize: 36 }, fields: "pixelSize" }});

        // Outer border on entire table
        const tableRange = { sheetId: tabId, startRowIndex:0, endRowIndex: totalPayRow+1, startColumnIndex:0, endColumnIndex:6 };
        const borderStyle = { style:"SOLID_MEDIUM", color:{ red:0.18, green:0.33, blue:0.59 } };
        requests.push({ updateBorders: { range: tableRange,
          top: borderStyle, bottom: borderStyle, left: borderStyle, right: borderStyle }});

        // Inner horizontal borders between shift rows
        for (let r = firstShift; r <= lastShift; r++) {
          requests.push({ updateBorders: { range: row(r),
            bottom: { style:"SOLID", color:{ red:0.85, green:0.88, blue:0.95 } } }});
        }

        // Freeze header row
        requests.push({ updateSheetProperties: { properties: {
          sheetId: tabId, gridProperties: { frozenRowCount: 1 }
        }, fields: "gridProperties.frozenRowCount" }});

        // Execute formatting
        await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`, {
          method:"POST",
          headers:{ Authorization:"Bearer "+accessToken, "Content-Type":"application/json" },
          body: JSON.stringify({ requests })
        });

        showGoogleStatus("success", t.googleSheetsOk);
        return true;
      }

      function confirmDuplicate() {
        const t = T[lang], el = document.getElementById("googleStatus");
        return new Promise(resolve => {
          el.style.display = "block"; el.className = "google-status warning";
          el.innerHTML = `<div style="margin-bottom:6px;font-weight:600">${t.sheetsDupTitle}</div><div style="font-size:.85rem;margin-bottom:10px">${t.sheetsDupMsg}</div><div style="display:flex;gap:8px"><button class="dup-yes-btn" id="dupYes">${t.sheetsDupYes}</button><button class="dup-no-btn" id="dupNo">${t.sheetsDupNo}</button></div>`;
          document.getElementById("dupYes").onclick = () => resolve(true);
          document.getElementById("dupNo").onclick  = () => resolve(false);
        });
      }

      async function sendToBoth() {
        const parsed = parseAndValidate(); if (!parsed) return;
        const calOk = await _doCalendar(parsed.shifts, parsed.period); if (calOk===false) return;
        const shtOk = await _doSheets(parsed.shifts, parsed.period);   if (shtOk===false) return;
        showGoogleStatus("success", T[lang].googleBothOk);
        renderPreview(parsed.shifts);
        resetAfterAction();
      }

      function showGoogleStatus(type, msg) {
        const el = document.getElementById("googleStatus");
        el.style.display = "block"; el.className = "google-status "+type; el.textContent = msg;
      }

      // ── ICS (everyone) ────────────────────────────────────────────────────
      function generate() {
        const t = T[lang];
        document.getElementById("errorBox").style.display   = "none";
        document.getElementById("successBox").style.display = "none";
        document.getElementById("preview").style.display    = "none";
        const parsed = parseAndValidate(); if (!parsed) return;

        const blob = new Blob([buildIcs(parsed.shifts)], { type:"text/calendar;charset=utf-8" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href=url; a.download=periodToFilename(parsed.period); a.click();
        URL.revokeObjectURL(url);
        showSuccess(t.successMsg + periodToFilename(parsed.period));
        renderPreview(parsed.shifts);
        resetAfterAction();
      }

      function renderPreview(shifts) {
        const t      = T[lang];
        const DAYS   = lang==="es"?DAYS_ES:DAYS_EN;
        const MONTHS = lang==="es"?MONTHS_ES:MONTHS_EN;
        const merged = mergeShifts(shifts);
        const total  = merged.reduce((a,s)=>a+parseFloat(s.hours),0);
        document.getElementById("weeklySummary").textContent = `${t.weeklyLabel} ${total.toFixed(2)} hrs`;
        const fmt  = dt => { let h=dt.getHours(),m=dt.getMinutes(),ap=h>=12?"PM":"AM"; h=h%12||12; return `${h}:${String(m).padStart(2,"0")} ${ap}`; };
        document.getElementById("shiftList").innerHTML = merged.map(s => {
          const d = new Date(s.date+"T00:00:00");
          return `<div class="shift-item"><span class="shift-day">${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}</span><span class="shift-time">${fmt(s.startDt)} &ndash; ${fmt(s.endDt)}</span><span class="shift-hrs">${s.hours}h</span></div>`;
        }).join("");
        document.getElementById("preview").style.display = "block";
      }

      function buildIcs(shifts) {
        const t              = T[lang];
        const merged         = mergeShifts(shifts);
        const now            = toIcsDt(new Date()).replace(/T/,"")+"Z";
        const totalWeekHours = merged.reduce((a,s)=>a+parseFloat(s.hours),0);
        const totalWeekDays  = merged.length;
        const location       = document.getElementById("locationSelect").value;
        const extraMins      = parseInt(document.getElementById("reminderSelect").value);
        const includeWeekly  = document.getElementById("weeklyToggle").checked;

        let events = "";
        for (const s of merged) {
          const uid  = "costco-"+s.date+"-"+Math.random().toString(36).slice(2);
          let desc   = `${t.descShift}\\n⏱ ${t.descHours}: ${s.hours} hrs`;
          if (includeWeekly) desc += `\\n📅 ${t.descWeekTotal}: ${totalWeekHours.toFixed(2)} hrs (${totalWeekDays} ${t.descWeekDays})`;
          const lines = ["BEGIN:VEVENT",`UID:${uid}`,`DTSTAMP:${now}`,`DTSTART:${toIcsDt(s.startDt)}`,`DTEND:${toIcsDt(s.endDt)}`,"SUMMARY:Costco","COLOR:grape","X-APPLE-CALENDAR-COLOR:#8B008B",`DESCRIPTION:${desc}`];
          if (location) lines.push(`LOCATION:${location}`);
          // Fixed 30-min reminder
          lines.push("BEGIN:VALARM","ACTION:DISPLAY",`DESCRIPTION:${t.descShift}`,"TRIGGER:-PT30M","END:VALARM");
          // Extra reminder if set
          if (extraMins > 0) {
            const th = extraMins/60;
            const tr = Number.isInteger(th)?`-PT${th}H`:`-PT${extraMins}M`;
            lines.push("BEGIN:VALARM","ACTION:DISPLAY",`DESCRIPTION:${t.descShift}`,`TRIGGER:${tr}`,"END:VALARM");
          }
          lines.push("END:VEVENT");
          events += lines.join("\r\n")+"\r\n";
        }
        return ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//CostcoSchedule//EN//","CALSCALE:GREGORIAN","METHOD:PUBLISH",events.trim(),"END:VCALENDAR"].join("\r\n");
      }

      // ── HELPERS ───────────────────────────────────────────────────────────
      function setImageMode(mode) {
        imageMode = mode;
        document.getElementById("imgmode-btn-printed").classList.toggle("active", mode==="printed");

      function addShift() {
        const date=document.getElementById("manualDate").value, start=document.getElementById("manualStart").value, end=document.getElementById("manualEnd").value;
        if (!date||!start||!end) return;
        let hours=(new Date("2000-01-01T"+end)-new Date("2000-01-01T"+start))/3600000;
        if (hours<=0) hours+=24;
        manualShifts.push({ date, start:fmt12(start), end:fmt12(end), hours:hours.toFixed(2) });
        renderManualShifts();
        document.getElementById("manualDate").value=document.getElementById("manualStart").value=document.getElementById("manualEnd").value="";
      }
      function fmt12(t24) { const [h,m]=t24.split(":"); const hr=parseInt(h); return `${hr%12||12}:${m}${hr>=12?"P":"A"}`; }
      function removeShift(i) { manualShifts.splice(i,1); renderManualShifts(); }
      function clearManualShifts() { manualShifts=[]; renderManualShifts(); }
      function renderManualShifts() {
        const DAYS=lang==="es"?DAYS_ES:DAYS_EN, MONTHS=lang==="es"?MONTHS_ES:MONTHS_EN;
        document.getElementById("manualShiftsList").innerHTML = manualShifts.map((s,i)=>{
          const d=new Date(s.date+"T00:00:00");
          return `<div class="manual-shift-item"><span>${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}</span><span>${s.start} - ${s.end}</span><button onclick="removeShift(${i})">×</button></div>`;
        }).join("");
      }
      function toggleTheme() {
        theme=theme==="light"?"dark":"light";
        document.documentElement.setAttribute("data-theme",theme);
        localStorage.setItem("theme",theme);
        updateThemeIcon();
      }
      function updateThemeIcon() {
        document.getElementById("themeToggle").innerHTML = theme==="light"
          ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
          : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
      }
      function setLang(l) {
        lang=l;
        document.getElementById("btn-es").classList.toggle("active",l==="es");
        document.getElementById("btn-en").classList.toggle("active",l==="en");
        applyTranslations(); updatePrompt();
      }
      function applyTranslations() {
        const t=T[lang];
        const s=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
        s("txt-subtitle",t.subtitle); s("txt-step1-title",t.step1Title); s("txt-step1-desc",t.step1Desc);
        s("txt-imgmode-printed",t.imgModePrinted); s("txt-imgmode-kronos",t.imgModeKronos);
        s("txt-step2-title",t.step2Title); s("txt-step2-desc",t.step2Desc); s("txt-name-label",t.nameLabel);

        s("txt-step4-title",t.step4Title); s("txt-step4-desc",t.step4Desc);

        if (imageMode==="kronos") {
          return lang==="es"
            ?`Analiza esta imagen de la app Kronos de Costco que muestra mi horario de trabajo.\nDevuelveme UNICAMENTE un JSON valido con este formato exacto, sin explicacion ni texto extra:\n\n{\n  "period": "M/DD/YY - M/DD/YY",\n  "shifts": [\n    {"date": "YYYY-MM-DD", "start": "H:MMX", "end": "H:MMX", "hours": "N.NN"}\n  ]\n}\n\nDonde X es A o P (AM/PM). Incluye TODOS los turnos visibles. Ignora duplicados y "System Calculation Only".\n\nAbre en: https://claude.ai`
            :`Analyze this Costco Kronos app screenshot showing my work schedule.\nReturn ONLY a valid JSON in this exact format, no explanation or extra text:\n\n{\n  "period": "M/DD/YY - M/DD/YY",\n  "shifts": [\n    {"date": "YYYY-MM-DD", "start": "H:MMX", "end": "H:MMX", "hours": "N.NN"}\n  ]\n}\n\nWhere X is A or P. Include ALL visible shifts. Ignore duplicates and "System Calculation Only".\n\nOpen at: https://claude.ai`;

      function updatePrompt() {
        document.getElementById("promptText").textContent = getPromptText(document.getElementById("employeeName").value.trim()||OWNER_NAME);
      }
      function fixQuotes(s) { return s.replace(/[\u201c\u201d]/g,'"').replace(/[\u2018\u2019]/g,'"'); }
      function parseTime(str,refDate) {
        str=str.trim().toUpperCase(); const ap=str.slice(-1),tp=str.slice(0,-1);
        let [h,m]=tp.includes(":")?tp.split(":").map(Number):[parseInt(tp),0];
        if(ap==="P"&&h!==12) h+=12; if(ap==="A"&&h===12) h=0;
        const d=new Date(refDate); d.setHours(h,m,0,0); return d;
      }
      function toIcsDt(dt) { const p=n=>String(n).padStart(2,"0"); return `${dt.getFullYear()}${p(dt.getMonth()+1)}${p(dt.getDate())}T${p(dt.getHours())}${p(dt.getMinutes())}00`; }
      function mergeShifts(shifts) {
        const byDate={};
        for (const s of shifts) { if(!byDate[s.date]) byDate[s.date]=[]; byDate[s.date].push(s); }
        return Object.keys(byDate).sort().map(day=>{
          const ds=byDate[day], ref=new Date(day+"T00:00:00");
          const sts=ds.map(s=>parseTime(s.start,ref));
          const ens=ds.map((s,i)=>{ let e=parseTime(s.end,ref); if(e<=sts[i]) e=new Date(e.getTime()+86400000); return e; });
          return { date:day, startDt:new Date(Math.min(...sts)), endDt:new Date(Math.max(...ens)), hours:ds.reduce((a,s)=>a+parseFloat(s.hours),0).toFixed(2) };
        });
      }
      function periodToFilename(p) { return "costco_"+p.trim().replace(/\//g,"-").replace(" - ","_")+".ics"; }
      function showError(msg)   { const el=document.getElementById("errorBox");   el.textContent=msg; el.style.display="block"; document.getElementById("successBox").style.display="none"; document.getElementById("preview").style.display="none"; }
      function showSuccess(msg) { const el=document.getElementById("successBox"); el.textContent=msg; el.style.display="block"; document.getElementById("errorBox").style.display="none"; }
      function copyPrompt() {
        navigator.clipboard.writeText(document.getElementById("promptText").textContent).then(()=>{
          const btn=document.getElementById("copyPromptBtn"); btn.textContent=T[lang].copiedBtn; btn.classList.add("copied");
          setTimeout(()=>{ btn.textContent=T[lang].copyBtn; btn.classList.remove("copied"); },2000);
        });
      }
