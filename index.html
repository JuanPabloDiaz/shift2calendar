<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Costco → Google Calendar | Juan Diaz</title>
    <meta
      name="description"
      content="Convert your Costco schedule to Google Calendar events."
    />
    <meta name="author" content="Juan Diaz" />
    <meta name="robots" content="index, follow" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📅%3C/text%3E%3C/svg%3E"
      type="image/svg+xml"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-KVRXZGZP52"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-KVRXZGZP52");
    </script>
  </head>
  <body>
    <div class="card">
      <div class="header-row">
        <div>
          <h1>
            <svg
              class="icon"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            Costco &rarr; Google Calendar
          </h1>
          <p class="subtitle" id="txt-subtitle"></p>
        </div>
        <div style="display: flex; gap: 8px; align-items: flex-start">
          <button
            class="theme-toggle"
            id="themeToggle"
            onclick="toggleTheme()"
            title="Toggle theme"
          ></button>
          <div class="lang-toggle">
            <button class="lang-btn" id="btn-es" onclick="setLang('es')">
              ES
            </button>
            <button class="lang-btn active" id="btn-en" onclick="setLang('en')">
              EN
            </button>
          </div>
        </div>
      </div>

      <!-- Step 1 -->
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-content">
          <div class="step-title" id="txt-step1-title"></div>
          <div class="step-desc" id="txt-step1-desc"></div>
          <div class="image-mode-toggle">
            <button
              class="image-mode-btn active"
              id="imgmode-btn-printed"
              onclick="setImageMode('printed')"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="6 9 6 2 18 2 18 9" />
                <path
                  d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"
                />
                <rect x="6" y="14" width="12" height="8" />
              </svg>
              <span id="txt-imgmode-printed"></span>
            </button>
            <button
              class="image-mode-btn"
              id="imgmode-btn-kronos"
              onclick="setImageMode('kronos')"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="5" y="2" width="14" height="20" rx="2" />
                <line x1="12" y1="18" x2="12.01" y2="18" />
              </svg>
              <span id="txt-imgmode-kronos"></span>
            </button>
          </div>
        </div>
      </div>

      <!-- Step 2: Name -->
      <div class="step" id="nameStep">
        <div class="step-num">2</div>
        <div class="step-content">
          <div class="step-title" id="txt-step2-title"></div>
          <div class="step-desc" id="txt-step2-desc"></div>
          <div class="name-input-wrap">
            <label id="txt-name-label"></label>
            <input
              type="text"
              class="name-input"
              id="employeeName"
              value="Diaz, Juan"
              oninput="onNameInput()"
            />
          </div>
        </div>
      </div>

      <!-- Step 3: Prompt -->
      <div class="step">
        <div class="step-num" id="stepnum-prompt">3</div>
        <div class="step-content">
          <div class="step-title" id="txt-step3-title"></div>
          <div class="step-desc" id="txt-step3-desc"></div>
          <div class="prompt-box" id="promptText"></div>
          <button
            class="copy-btn"
            id="copyPromptBtn"
            onclick="copyPrompt()"
          ></button>
        </div>
      </div>

      <!-- Step 4: JSON / Manual -->
      <div class="step">
        <div class="step-num" id="stepnum-json">4</div>
        <div class="step-content">
          <div class="step-title" id="txt-step4-title"></div>
          <div class="step-desc" id="txt-step4-desc"></div>
          <div class="input-toggle">
            <button
              class="input-toggle-btn active"
              id="btn-json"
              onclick="setInputMode('json')"
            >
              JSON
            </button>
            <button
              class="input-toggle-btn"
              id="btn-manual"
              onclick="setInputMode('manual')"
            >
              Manual
            </button>
          </div>
          <textarea
            id="jsonInput"
            oninput="validateJsonInputLive()"
            placeholder='{"period": "3/02/26 - 3/08/26", "shifts": [...]}'
          ></textarea>
          <button
            class="fix-json-btn"
            id="fixJsonBtn"
            onclick="fixJsonInput()"
            style="display: none"
          ></button>
          <div class="json-validation" id="jsonValidation"></div>
          <div id="manualInput" style="display: none">
            <div class="manual-row">
              <input type="date" id="manualDate" class="manual-input" />
              <input type="time" id="manualStart" class="manual-input small" />
              <span>-</span>
              <input type="time" id="manualEnd" class="manual-input small" />
              <button class="add-shift-btn" onclick="addShift()">+</button>
            </div>
            <div class="manual-shifts" id="manualShiftsList"></div>
            <button
              class="clear-shifts-btn"
              onclick="clearManualShifts()"
              id="txt-clear-btn"
            ></button>
          </div>
        </div>
      </div>

      <!-- Step 5: Options -->
      <div class="step">
        <div class="step-num" id="stepnum-options">5</div>
        <div class="step-content">
          <div class="step-title" id="txt-step5-title"></div>
          <div class="step-desc" id="txt-step5-desc"></div>

          <!-- Location -->
          <div class="option-row">
            <div class="option-label-wrap">
              <svg
                class="opt-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
              <label class="option-label" id="txt-opt-location-label"></label>
            </div>
            <div class="option-control">
              <select class="reminder-select" id="locationSelect">
                <option value="500 Tyvola Rd, Charlotte, NC 28217" selected>
                  CLT
                </option>
                <option value="2125 Matthews Township Pkwy, Matthews, NC 28105">
                  Matthews
                </option>
                <option value="8800 Charlotte Highway, Indian Land, SC 29707">
                  Indian Land
                </option>
                <option value="392 Talbert Rd, Mooresville, NC 28117">
                  Mooresville
                </option>
              </select>
            </div>
          </div>

          <!-- Reminder 1: fixed 30 min -->
          <div class="option-row">
            <div class="option-label-wrap">
              <svg
                class="opt-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
              <label class="option-label" id="txt-opt-reminder1-label"></label>
            </div>
            <div class="option-control">
              <span class="reminder-fixed-badge">30 min</span>
            </div>
          </div>

          <!-- Reminder 2: editable -->
          <div class="option-row">
            <div class="option-label-wrap">
              <svg
                class="opt-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                <line x1="12" y1="2" x2="12" y2="4" />
              </svg>
              <label class="option-label" id="txt-opt-reminder2-label"></label>
            </div>
            <div class="option-control">
              <select class="reminder-select" id="reminderSelect">
                <option value="0" id="opt-none"></option>
                <option value="15">15 min</option>
                <option value="60">1 h</option>
                <option value="120" selected>2 h</option>
                <option value="180">3 h</option>
                <option value="1440">1 day</option>
              </select>
            </div>
          </div>

          <!-- Weekly summary toggle -->
          <div class="option-row">
            <div class="option-label-wrap">
              <svg
                class="opt-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="18" y1="20" x2="18" y2="10" />
                <line x1="12" y1="20" x2="12" y2="4" />
                <line x1="6" y1="20" x2="6" y2="14" />
              </svg>
              <label class="option-label" id="txt-opt-weekly-label"></label>
            </div>
            <div class="option-control">
              <label class="toggle-switch">
                <input type="checkbox" id="weeklyToggle" checked />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>

          <!-- Lunch reminder toggle -->
          <div class="option-row">
            <div class="option-label-wrap">
              <svg
                class="opt-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M3 12h18" />
                <path d="M7 8v8" />
                <path d="M17 8v8" />
                <path d="M10 8v8" />
                <path d="M14 8v8" />
              </svg>
              <label class="option-label" id="txt-opt-lunch-label"></label>
            </div>
            <div class="option-control">
              <label class="toggle-switch">
                <input type="checkbox" id="lunchToggle" checked />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Generate (everyone) -->
      <button
        class="generate-btn"
        id="txt-generate-btn"
        onclick="generate()"
      ></button>

      <!-- Juan Diaz only -->
      <div id="juanSection" style="display: none">
        <div class="juan-divider"><span id="txt-juan-divider"></span></div>

        <div id="googleAuthRow">
          <div id="googleSignedOut">
            <button class="google-btn" onclick="signInWithGoogle()">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  fill="#4285F4"
                />
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853"
                />
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                  fill="#FBBC05"
                />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335"
                />
              </svg>
              <span id="txt-google-signin"></span>
            </button>
          </div>
          <div id="googleSignedIn" style="display: none">
            <div class="signed-in-row">
              <div class="signed-in-info">
                <span class="signed-in-dot"></span>
                <span id="signedInEmail" class="signed-in-email"></span>
              </div>
              <button
                class="sign-out-btn"
                onclick="signOut()"
                id="txt-signout-btn"
              ></button>
            </div>
            <div class="google-action-btns">
              <button
                class="google-action-btn calendar-btn"
                id="txt-send-calendar"
                onclick="sendToGoogleCalendar()"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="4" width="18" height="18" rx="2" />
                  <line x1="16" y1="2" x2="16" y2="6" />
                  <line x1="8" y1="2" x2="8" y2="6" />
                  <line x1="3" y1="10" x2="21" y2="10" />
                </svg>
                <span></span>
              </button>
              <button
                class="google-action-btn sheets-btn"
                id="txt-send-sheets"
                onclick="sendToSheets()"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="3" width="18" height="18" rx="2" />
                  <line x1="3" y1="9" x2="21" y2="9" />
                  <line x1="3" y1="15" x2="21" y2="15" />
                  <line x1="9" y1="3" x2="9" y2="21" />
                </svg>
                <span></span>
              </button>
              <button
                class="google-action-btn both-btn"
                id="txt-send-both"
                onclick="sendToBoth()"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="20 6 9 17 4 12" />
                </svg>
                <span></span>
              </button>
              <button
                class="google-action-btn sheets-btn"
                id="txt-open-sheet"
                onclick="openOwnerSheet()"
                style="display: none"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M14 3h7v7" />
                  <path d="M10 14L21 3" />
                  <path d="M21 14v7h-7" />
                  <path d="M3 10V3h7" />
                </svg>
                <span></span>
              </button>
              <button
                class="google-action-btn stats-btn"
                id="txt-view-stats"
                onclick="openStats()"
                style="display: none"
              >
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <line x1="18" y1="20" x2="18" y2="10" />
                  <line x1="12" y1="20" x2="12" y2="4" />
                  <line x1="6" y1="20" x2="6" y2="14" />
                </svg>
                <span></span>
              </button>
            </div>
          </div>
        </div>
        <div
          class="google-status"
          id="googleStatus"
          style="display: none"
        ></div>
      </div>

      <div class="error" id="errorBox"></div>
      <div class="success" id="successBox"></div>

      <div class="preview" id="preview">
        <hr class="divider" />
        <div class="preview-header">
          <div class="preview-title" id="txt-preview-title"></div>
          <div class="weekly-summary" id="weeklySummary"></div>
        </div>
        <div id="shiftList"></div>
      </div>
    </div>

    <footer class="footer">
      <p>
        Developed by
        <a href="https://jpdiaz.dev" target="_blank" rel="noopener noreferrer"
          ><strong>Juan Diaz</strong></a
        >
      </p>
      <p class="footer-legal">Not affiliated with any employer.</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
