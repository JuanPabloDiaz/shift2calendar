<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Costco → Google Calendar | Juan Diaz</title>
    <meta
      name="description"
      content="Convierte tu horario de Costco en eventos de calendario. Exporta tus turnos a Google Calendar easily."
    />
    <meta
      name="keywords"
      content="Costco, schedule, calendar, horario, Google Calendar, turnos, ICS"
    />
    <meta name="author" content="Juan Diaz" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Costco → Google Calendar | Juan Diaz" />
    <meta
      property="og:description"
      content="Convierte tu horario de Costco en eventos de calendario"
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Costco → Google Calendar | Juan Diaz" />
    <meta
      name="twitter:description"
      content="Convierte tu horario de Costco en eventos de calendario"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📅%3C/text%3E%3C/svg%3E"
      type="image/svg+xml"
    />
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📅%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="card">
      <div class="header-row">
        <div>
          <h1>
            <svg
              class="icon"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            Costco → Google Calendar
          </h1>
          <p class="subtitle" id="txt-subtitle"></p>
        </div>
        <div style="display: flex; gap: 8px; align-items: flex-start">
          <button
            class="theme-toggle"
            id="themeToggle"
            onclick="toggleTheme()"
            title="Toggle theme"
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="icon-moon"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
          <div class="lang-toggle">
            <button class="lang-btn active" id="btn-es" onclick="setLang('es')">
              ES
            </button>
            <button class="lang-btn" id="btn-en" onclick="setLang('en')">
              EN
            </button>
          </div>
        </div>
      </div>

      <!-- Step 0: Name -->
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-content">
          <div class="step-title" id="txt-step1-title"></div>
          <div class="step-desc" id="txt-step1-desc"></div>
          <div class="name-input-wrap">
            <label id="txt-name-label"></label>
            <input
              type="text"
              class="name-input"
              id="employeeName"
              value="Diaz, Juan"
              oninput="updatePrompt()"
            />
          </div>
        </div>
      </div>

      <!-- Step 1: Copy prompt -->
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-content">
          <div class="step-title" id="txt-step2-title"></div>
          <div class="step-desc" id="txt-step2-desc"></div>
          <div class="prompt-box" id="promptText"></div>
          <button
            class="copy-btn"
            id="copyPromptBtn"
            onclick="copyPrompt()"
          ></button>
        </div>
      </div>

      <!-- Step 2: Paste JSON or Manual Input -->
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-content">
          <div class="step-title" id="txt-step3-title"></div>
          <div class="step-desc" id="txt-step3-desc"></div>

          <div class="input-toggle">
            <button
              class="input-toggle-btn active"
              id="btn-json"
              onclick="setInputMode('json')"
            >
              JSON
            </button>
            <button
              class="input-toggle-btn"
              id="btn-manual"
              onclick="setInputMode('manual')"
            >
              Manual
            </button>
          </div>

          <textarea
            id="jsonInput"
            placeholder='{"period": "3/02/26 - 3/08/26", "shifts": [...]}'
          ></textarea>

          <div id="manualInput" style="display: none">
            <div class="manual-row">
              <input type="date" id="manualDate" class="manual-input" />
              <input
                type="time"
                id="manualStart"
                class="manual-input small"
                placeholder="Inicio"
              />
              <span>-</span>
              <input
                type="time"
                id="manualEnd"
                class="manual-input small"
                placeholder="Fin"
              />
              <button class="add-shift-btn" onclick="addShift()">+</button>
            </div>
            <div class="manual-shifts" id="manualShiftsList"></div>
            <button
              class="clear-shifts-btn"
              onclick="clearManualShifts()"
              id="txt-clear-btn"
            >
              Limpiar turnos
            </button>
          </div>
        </div>
      </div>

      <button
        class="generate-btn"
        id="txt-generate-btn"
        onclick="generate()"
      ></button>

      <div class="error" id="errorBox"></div>
      <div class="success" id="successBox"></div>

      <div class="preview" id="preview">
        <hr class="divider" />
        <div class="preview-title" id="txt-preview-title"></div>
        <div id="shiftList"></div>
      </div>
    </div>

    <footer class="footer">
      <p>Developed by <strong>Juan Diaz</strong></p>
    </footer>

    <script>
      // ── i18n ──────────────────────────────────────────────────────────────────────
      const T = {
        es: {
          subtitle: "Convierte tu horario en eventos de calendario",
          step1Title: "Tu nombre en el horario",
          step1Desc: "Escribe tu nombre exactamente como aparece en la imagen",
          nameLabel: "Nombre (Apellido, Nombre)",
          step2Title: "Copia el prompt",
          step2Desc: "Ábrelo en Claude y adjunta la foto del horario",
          copyBtn: "Copiar prompt",
          copiedBtn: "¡Copiado!",
          step3Title: "Pega el JSON aquí",
          step3Desc: "Copia la respuesta de Claude y pégala abajo",
          generateBtn: "Generar y descargar .ics",
          previewTitle: "Turnos detectados:",
          errEmpty: "Pega el JSON de Claude primero.",
          errJson: "JSON inválido: ",
          errJsonHint: ". Asegúrate de copiar el bloque completo.",
          errNoShifts: "No se encontraron turnos en el JSON.",
          successMsg: "✅ Descargado: ",
          clearBtn: "Limpiar turnos",
        },
        en: {
          subtitle: "Convert your schedule into calendar events",
          step1Title: "Your name on the schedule",
          step1Desc: "Type your name exactly as it appears in the image",
          nameLabel: "Name (Last, First)",
          step2Title: "Copy the prompt",
          step2Desc:
            "Open Claude, paste this prompt and attach the schedule photo",
          copyBtn: "Copy prompt",
          copiedBtn: "Copied!",
          step3Title: "Paste the JSON here",
          step3Desc: "Copy Claude's response and paste it below",
          generateBtn: "Generate & download .ics",
          previewTitle: "Detected shifts:",
          errEmpty: "Paste Claude's JSON first.",
          errJson: "Invalid JSON: ",
          errJsonHint: ". Make sure you copied the full block.",
          errNoShifts: "No shifts found in the JSON.",
          successMsg: "✅ Downloaded: ",
          clearBtn: "Clear shifts",
        },
      };

      const DAYS_ES = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];
      const MONTHS_ES = [
        "Ene",
        "Feb",
        "Mar",
        "Abr",
        "May",
        "Jun",
        "Jul",
        "Ago",
        "Sep",
        "Oct",
        "Nov",
        "Dic",
      ];
      const DAYS_EN = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const MONTHS_EN = [
        "Jan",
        "Feb",
        "Mar",
        "Apr",
        "May",
        "Jun",
        "Jul",
        "Aug",
        "Sep",
        "Oct",
        "Nov",
        "Dec",
      ];

      let lang = "es";
      let theme = localStorage.getItem("theme") || "light";
      let inputMode = "json";
      let manualShifts = [];

      function setInputMode(mode) {
        inputMode = mode;
        document
          .getElementById("btn-json")
          .classList.toggle("active", mode === "json");
        document
          .getElementById("btn-manual")
          .classList.toggle("active", mode === "manual");
        document.getElementById("jsonInput").style.display =
          mode === "json" ? "block" : "none";
        document.getElementById("manualInput").style.display =
          mode === "manual" ? "block" : "none";
      }

      function addShift() {
        const date = document.getElementById("manualDate").value;
        const start = document.getElementById("manualStart").value;
        const end = document.getElementById("manualEnd").value;

        if (!date || !start || !end) return;

        const startDt = new Date(`2000-01-01T${start}`);
        const endDt = new Date(`2000-01-01T${end}`);
        let hours = (endDt - startDt) / (1000 * 60 * 60);
        if (hours <= 0) hours += 24;

        const shift = {
          date: date,
          start: formatTime12h(start),
          end: formatTime12h(end),
          hours: hours.toFixed(2),
        };

        manualShifts.push(shift);
        renderManualShifts();

        document.getElementById("manualDate").value = "";
        document.getElementById("manualStart").value = "";
        document.getElementById("manualEnd").value = "";
      }

      function formatTime12h(time24) {
        const [h, m] = time24.split(":");
        const hour = parseInt(h);
        const ampm = hour >= 12 ? "P" : "A";
        const hour12 = hour % 12 || 12;
        return `${hour12}:${m}${ampm}`;
      }

      function removeShift(index) {
        manualShifts.splice(index, 1);
        renderManualShifts();
      }

      function renderManualShifts() {
        const list = document.getElementById("manualShiftsList");
        const DAYS = lang === "es" ? DAYS_ES : DAYS_EN;
        const MONTHS = lang === "es" ? MONTHS_ES : MONTHS_EN;

        list.innerHTML = manualShifts
          .map((s, i) => {
            const d = new Date(s.date + "T00:00:00");
            const label = `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
            return `
            <div class="manual-shift-item">
              <span>${label}</span>
              <span>${s.start} - ${s.end}</span>
              <button onclick="removeShift(${i})">×</button>
            </div>
          `;
          })
          .join("");
      }

      function clearManualShifts() {
        manualShifts = [];
        renderManualShifts();
      }

      function toggleTheme() {
        theme = theme === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
        document.getElementById("themeToggle").innerHTML =
          theme === "light"
            ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
            : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
      }

      function applyTheme() {
        document.documentElement.setAttribute("data-theme", theme);
        document.getElementById("themeToggle").innerHTML =
          theme === "light"
            ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
            : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
      }

      function setLang(l) {
        lang = l;
        document
          .getElementById("btn-es")
          .classList.toggle("active", l === "es");
        document
          .getElementById("btn-en")
          .classList.toggle("active", l === "en");
        applyTranslations();
        updatePrompt();
      }

      function applyTranslations() {
        const t = T[lang];
        document.getElementById("txt-subtitle").textContent = t.subtitle;
        document.getElementById("txt-step1-title").textContent = t.step1Title;
        document.getElementById("txt-step1-desc").textContent = t.step1Desc;
        document.getElementById("txt-name-label").textContent = t.nameLabel;
        document.getElementById("txt-step2-title").textContent = t.step2Title;
        document.getElementById("txt-step2-desc").textContent = t.step2Desc;
        document.getElementById("copyPromptBtn").textContent = t.copyBtn;
        document.getElementById("txt-step3-title").textContent = t.step3Title;
        document.getElementById("txt-step3-desc").textContent = t.step3Desc;
        document.getElementById("txt-generate-btn").textContent = t.generateBtn;
        document.getElementById("txt-preview-title").textContent =
          t.previewTitle;
        document.getElementById("txt-clear-btn").textContent = t.clearBtn;
        renderManualShifts();
      }

      function getPromptText(name) {
        if (lang === "es") {
          return `Analiza esta imagen de un horario de Costco y extrae SOLO los turnos de "${name}".
Devuelveme UNICAMENTE un JSON valido con este formato exacto, sin explicacion ni texto extra:

{
  "period": "M/DD/YY - M/DD/YY",
  "shifts": [
    {"date": "YYYY-MM-DD", "start": "H:MMX", "end": "H:MMX", "hours": "N.NN"}
  ]
}

Donde X es A o P. El campo "period" es el Time Period de la parte superior (ej: "3/02/26 - 3/08/26").
Si un dia tiene dos bloques de horario incluyelos como entradas separadas en shifts.`;
        } else {
          return `Analyze this Costco schedule image and extract ONLY the shifts for "${name}".
Return ONLY a valid JSON in this exact format, with no explanation or extra text:

{
  "period": "M/DD/YY - M/DD/YY",
  "shifts": [
    {"date": "YYYY-MM-DD", "start": "H:MMX", "end": "H:MMX", "hours": "N.NN"}
  ]
}

Where X is A or P. The "period" field is the Time Period from the top of the image (e.g. "3/02/26 - 3/08/26").
If a day has two time blocks include them as separate entries in shifts.`;
        }
      }

      function updatePrompt() {
        const name =
          document.getElementById("employeeName").value.trim() || "Diaz, Juan";
        document.getElementById("promptText").textContent = getPromptText(name);
      }

      // ── calendar logic ────────────────────────────────────────────────────────────
      function fixQuotes(str) {
        return str
          .replace(/[\u201c\u201d]/g, '"')
          .replace(/[\u2018\u2019]/g, '"');
      }

      function parseTime(timeStr, refDate) {
        timeStr = timeStr.trim().toUpperCase();
        const ampm = timeStr.slice(-1);
        const timePart = timeStr.slice(0, -1);
        let [hour, minute] = timePart.includes(":")
          ? timePart.split(":").map(Number)
          : [parseInt(timePart), 0];
        if (ampm === "P" && hour !== 12) hour += 12;
        if (ampm === "A" && hour === 12) hour = 0;
        const d = new Date(refDate);
        d.setHours(hour, minute, 0, 0);
        return d;
      }

      function toIcsDt(dt) {
        const pad = (n) => String(n).padStart(2, "0");
        return `${dt.getFullYear()}${pad(dt.getMonth() + 1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
      }

      function mergeShifts(shifts) {
        const byDate = {};
        for (const s of shifts) {
          if (!byDate[s.date]) byDate[s.date] = [];
          byDate[s.date].push(s);
        }
        const merged = [];
        for (const day of Object.keys(byDate).sort()) {
          const dayShifts = byDate[day];
          const refDate = new Date(day + "T00:00:00");
          const starts = dayShifts.map((s) => parseTime(s.start, refDate));
          const ends = dayShifts.map((s, i) => {
            let e = parseTime(s.end, refDate);
            if (e <= starts[i]) e = new Date(e.getTime() + 86400000);
            return e;
          });
          const earliestStart = new Date(Math.min(...starts));
          const latestEnd = new Date(Math.max(...ends));
          const totalHours = dayShifts.reduce(
            (a, s) => a + parseFloat(s.hours),
            0,
          );
          merged.push({
            date: day,
            startDt: earliestStart,
            endDt: latestEnd,
            hours: totalHours.toFixed(2),
          });
        }
        return merged;
      }

      function buildIcs(shifts) {
        const merged = mergeShifts(shifts);
        const now = toIcsDt(new Date()).replace(/T/, "") + "Z";
        let events = "";
        for (const s of merged) {
          const uid =
            "costco-" + s.date + "-" + Math.random().toString(36).slice(2);
          events +=
            [
              "BEGIN:VEVENT",
              `UID:${uid}`,
              `DTSTAMP:${now}`,
              `DTSTART:${toIcsDt(s.startDt)}`,
              `DTEND:${toIcsDt(s.endDt)}`,
              "SUMMARY:Costco",
              "COLOR:grape",
              `DESCRIPTION:Costco shift - ${s.hours} hrs`,
              "END:VEVENT",
            ].join("\r\n") + "\r\n";
        }
        return [
          "BEGIN:VCALENDAR",
          "VERSION:2.0",
          "PRODID:-//CostcoSchedule//EN//",
          "CALSCALE:GREGORIAN",
          "METHOD:PUBLISH",
          events.trim(),
          "END:VCALENDAR",
        ].join("\r\n");
      }

      function periodToFilename(period) {
        return (
          "costco_" +
          period.trim().replace(/\//g, "-").replace(" - ", "_") +
          ".ics"
        );
      }

      function showError(msg) {
        const el = document.getElementById("errorBox");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("successBox").style.display = "none";
        document.getElementById("preview").style.display = "none";
      }

      function showSuccess(msg) {
        const el = document.getElementById("successBox");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("errorBox").style.display = "none";
      }

      function generate() {
        const t = T[lang];
        document.getElementById("errorBox").style.display = "none";
        document.getElementById("successBox").style.display = "none";
        document.getElementById("preview").style.display = "none";

        let shifts, period;

        if (inputMode === "manual") {
          if (manualShifts.length === 0) {
            showError(t.errNoShifts);
            return;
          }
          shifts = manualShifts;
          period = "costco";
        } else {
          let raw = document.getElementById("jsonInput").value.trim();
          if (!raw) {
            showError(t.errEmpty);
            return;
          }

          raw = fixQuotes(raw);
          const match = raw.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
          if (match) raw = match[0];

          let data;
          try {
            data = JSON.parse(raw);
          } catch (e) {
            showError(t.errJson + e.message + t.errJsonHint);
            return;
          }

          if (Array.isArray(data)) {
            shifts = data;
            period = "costco";
          } else {
            shifts = data.shifts || [];
            period = data.period || "costco";
          }

          if (!shifts.length) {
            showError(t.errNoShifts);
            return;
          }
        }

        const icsContent = buildIcs(shifts);
        const filename = periodToFilename(period);
        const blob = new Blob([icsContent], {
          type: "text/calendar;charset=utf-8",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);

        showSuccess(t.successMsg + filename);

        const DAYS = lang === "es" ? DAYS_ES : DAYS_EN;
        const MONTHS = lang === "es" ? MONTHS_ES : MONTHS_EN;
        const merged = mergeShifts(shifts);
        const list = document.getElementById("shiftList");
        list.innerHTML = "";
        for (const s of merged) {
          const d = new Date(s.date + "T00:00:00");
          const label = `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
          const fmt = (dt) => {
            let h = dt.getHours(),
              m = dt.getMinutes(),
              ap = h >= 12 ? "PM" : "AM";
            h = h % 12 || 12;
            return `${h}:${String(m).padStart(2, "0")} ${ap}`;
          };
          list.innerHTML += `
      <div class="shift-item">
        <span class="shift-day">${label}</span>
        <span class="shift-time">${fmt(s.startDt)} – ${fmt(s.endDt)}</span>
        <span class="shift-hrs">${s.hours}h</span>
      </div>`;
        }
        document.getElementById("preview").style.display = "block";
      }

      function copyPrompt() {
        const text = document.getElementById("promptText").textContent;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById("copyPromptBtn");
          btn.textContent = T[lang].copiedBtn;
          btn.classList.add("copied");
          setTimeout(() => {
            btn.textContent = T[lang].copyBtn;
            btn.classList.remove("copied");
          }, 2000);
        });
      }

      // Init
      applyTheme();
      applyTranslations();
      updatePrompt();
    </script>
  </body>
</html>
