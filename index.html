      <!-- Step 1: Image type -->

              📱 <span id="txt-imgmode-kronos"></span>
            </button>
          </div>

      </div>

      <!-- Step 2: Name (printed only) -->
      <div class="step" id="nameStep">

        <div class="step-content">
          <div class="step-title" id="txt-step2-title"></div>

            <label id="txt-name-label"></label>

        </div>
      </div>

      <!-- Step 3: Copy prompt -->
      <div class="step">
        <div class="step-num" id="stepnum-prompt">3</div>
        <div class="step-content">
          <div class="step-title" id="txt-step3-title"></div>
          <div class="step-desc" id="txt-step3-desc"></div>
          <div class="prompt-box" id="promptText"></div>
          <button class="copy-btn" id="copyPromptBtn" onclick="copyPrompt()"></button>
        </div>
      </div>

      <!-- Step 4: Paste JSON or Manual -->
      <div class="step">
        <div class="step-num" id="stepnum-json">4</div>
        <div class="step-content">
          <div class="step-title" id="txt-step4-title"></div>
          <div class="step-desc" id="txt-step4-desc"></div>

          <div class="input-toggle">
            <button class="input-toggle-btn active" id="btn-json" onclick="setInputMode('json')">JSON</button>
            <button class="input-toggle-btn" id="btn-manual" onclick="setInputMode('manual')">Manual</button>

          <textarea id="jsonInput" placeholder='{"period": "3/02/26 - 3/08/26", "shifts": [...]}'></textarea>

            <div class="manual-shifts" id="manualShiftsList"></div>
            <button class="clear-shifts-btn" onclick="clearManualShifts()" id="txt-clear-btn">Limpiar turnos</button>

      <!-- Step 5: Calendar options -->

    <script>
      const T = {
        es: {
          subtitle: "Convierte tu horario en eventos de calendario",
          step1Title: "Tipo de imagen",
          step1Desc: "¿Qué tipo de imagen vas a usar?",
          imgModePrinted: "Horario impreso",
          imgModeKronos: "App Kronos",
          step2Title: "Tu nombre en el horario",
          step2Desc: "Escribe tu nombre exactamente como aparece en la imagen",
          nameLabel: "Nombre (Apellido, Nombre)",
          step3Title: "Copia el prompt",
          step3Desc: "Ábrelo en ChatGPT o Claude y adjunta la foto del horario",
          copyBtn: "Copiar prompt",
          copiedBtn: "¡Copiado!",
          step4Title: "Pega el JSON aquí",
          step4Desc: "Copia la respuesta de AI y pégala abajo",
          step5Title: "Personaliza los eventos",
          step5Desc: "Agrega más información a cada evento del calendario",
          optLocationLabel: "Ubicación",
          optLocationNone: "Sin ubicación",
          optReminderLabel: "Recordatorio",
          optReminderNone: "Sin recordatorio",
          optWeeklyLabel: "Total de horas en descripción",
          generateBtn: "Generar y descargar .ics",
          previewTitle: "Turnos detectados:",
          weeklyLabel: "Total semana:",
          errEmpty: "Pega el JSON de AI primero.",
          errJson: "JSON inválido: ",
          errJsonHint: ". Asegúrate de copiar el bloque completo.",
          errNoShifts: "No se encontraron turnos en el JSON.",
          successMsg: "✅ Descargado: ",
          clearBtn: "Limpiar turnos",
          descShift: "Turno Costco",
          descHours: "Horas hoy",
          descWeekTotal: "Total semana",
          descWeekDays: "días esta semana",
        },
        en: {
          subtitle: "Convert your schedule into calendar events",
          step1Title: "Image type",
          step1Desc: "What type of image are you using?",
          imgModePrinted: "Printed schedule",
          imgModeKronos: "Kronos app",
          step2Title: "Your name on the schedule",
          step2Desc: "Type your name exactly as it appears in the image",
          nameLabel: "Name (Last, First)",
          step3Title: "Copy the prompt",
          step3Desc: "Open ChatGPT or Claude, paste this prompt and attach the photo",
          copyBtn: "Copy prompt",
          copiedBtn: "Copied!",
          step4Title: "Paste the JSON here",
          step4Desc: "Copy AI's response and paste it below",
          step5Title: "Customize events",
          step5Desc: "Add more information to each calendar event",
          optLocationLabel: "Location",
          optLocationNone: "No location",
          optReminderLabel: "Reminder",
          optReminderNone: "No reminder",
          optWeeklyLabel: "Weekly hours total in description",
          generateBtn: "Generate & download .ics",
          previewTitle: "Detected shifts:",
          weeklyLabel: "Week total:",
          errEmpty: "Paste AI's JSON first.",
          errJson: "Invalid JSON: ",
          errJsonHint: ". Make sure you copied the full block.",
          errNoShifts: "No shifts found in the JSON.",
          successMsg: "✅ Downloaded: ",
          clearBtn: "Clear shifts",
          descShift: "Costco Shift",
          descHours: "Hours today",
          descWeekTotal: "Week total",
          descWeekDays: "days this week",
        },
      };

      const DAYS_ES = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];
      const MONTHS_ES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
      const DAYS_EN = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const MONTHS_EN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

      let lang = "en";
      let theme = localStorage.getItem("theme") || "light";
      let inputMode = "json";
      let imageMode = "printed";
      let manualShifts = [];

      function setImageMode(mode) {
        imageMode = mode;
        document.getElementById("imgmode-btn-printed").classList.toggle("active", mode === "printed");
        document.getElementById("imgmode-btn-kronos").classList.toggle("active", mode === "kronos");
        document.getElementById("nameStep").style.display = mode === "printed" ? "flex" : "none";
        document.getElementById("stepnum-prompt").textContent = mode === "printed" ? "3" : "2";
        document.getElementById("stepnum-json").textContent = mode === "printed" ? "4" : "3";
        document.getElementById("stepnum-options").textContent = mode === "printed" ? "5" : "4";
        updatePrompt();
      }

      function setInputMode(mode) {
        inputMode = mode;
        document.getElementById("btn-json").classList.toggle("active", mode === "json");
        document.getElementById("btn-manual").classList.toggle("active", mode === "manual");
        document.getElementById("jsonInput").style.display = mode === "json" ? "block" : "none";
        document.getElementById("manualInput").style.display = mode === "manual" ? "block" : "none";
      }

      function addShift() {
        const date = document.getElementById("manualDate").value;
        const start = document.getElementById("manualStart").value;
        const end = document.getElementById("manualEnd").value;
        if (!date || !start || !end) return;
        const startDt = new Date("2000-01-01T" + start);
        const endDt = new Date("2000-01-01T" + end);
        let hours = (endDt - startDt) / (1000 * 60 * 60);
        if (hours <= 0) hours += 24;
        manualShifts.push({ date, start: formatTime12h(start), end: formatTime12h(end), hours: hours.toFixed(2) });
        renderManualShifts();
        document.getElementById("manualDate").value = "";
        document.getElementById("manualStart").value = "";
        document.getElementById("manualEnd").value = "";
      }

      function formatTime12h(time24) {
        const [h, m] = time24.split(":");
        const hour = parseInt(h);
        const ampm = hour >= 12 ? "P" : "A";
        const hour12 = hour % 12 || 12;
        return `${hour12}:${m}${ampm}`;
      }

      function removeShift(index) {
        manualShifts.splice(index, 1);
        renderManualShifts();
      }

      function renderManualShifts() {
        const list = document.getElementById("manualShiftsList");
        const DAYS = lang === "es" ? DAYS_ES : DAYS_EN;
        const MONTHS = lang === "es" ? MONTHS_ES : MONTHS_EN;
        list.innerHTML = manualShifts.map((s, i) => {
          const d = new Date(s.date + "T00:00:00");
          const label = `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
          return `<div class="manual-shift-item"><span>${label}</span><span>${s.start} - ${s.end}</span><button onclick="removeShift(${i})">×</button></div>`;
        }).join("");
      }

      function clearManualShifts() {
        manualShifts = [];
        renderManualShifts();
      }

      function toggleTheme() {
        theme = theme === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
        updateThemeIcon();
      }

      function updateThemeIcon() {
        document.getElementById("themeToggle").innerHTML = theme === "light"
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
      }

      function setLang(l) {
        lang = l;
        document.getElementById("btn-es").classList.toggle("active", l === "es");
        document.getElementById("btn-en").classList.toggle("active", l === "en");
        applyTranslations();
        updatePrompt();
      }

      function applyTranslations() {
        const t = T[lang];
        document.getElementById("txt-subtitle").textContent = t.subtitle;
        document.getElementById("txt-step1-title").textContent = t.step1Title;
        document.getElementById("txt-step1-desc").textContent = t.step1Desc;
        document.getElementById("txt-imgmode-printed").textContent = t.imgModePrinted;
        document.getElementById("txt-imgmode-kronos").textContent = t.imgModeKronos;
        document.getElementById("txt-step2-title").textContent = t.step2Title;
        document.getElementById("txt-step2-desc").textContent = t.step2Desc;
        document.getElementById("txt-name-label").textContent = t.nameLabel;
        document.getElementById("txt-step3-title").textContent = t.step3Title;
        document.getElementById("txt-step3-desc").textContent = t.step3Desc;
        document.getElementById("copyPromptBtn").textContent = t.copyBtn;
        document.getElementById("txt-step4-title").textContent = t.step4Title;
        document.getElementById("txt-step4-desc").textContent = t.step4Desc;
        document.getElementById("txt-step5-title").textContent = t.step5Title;
        document.getElementById("txt-step5-desc").textContent = t.step5Desc;
        document.getElementById("txt-opt-location-label").textContent = t.optLocationLabel;
        document.getElementById("txt-opt-reminder-label").textContent = t.optReminderLabel;
        document.getElementById("txt-opt-weekly-label").textContent = t.optWeeklyLabel;
        document.getElementById("txt-generate-btn").textContent = t.generateBtn;
        document.getElementById("txt-preview-title").textContent = t.previewTitle;
        document.getElementById("txt-clear-btn").textContent = t.clearBtn;
        // Update "No reminder" option
        const optNone = document.getElementById("opt-none");
        if (optNone) optNone.textContent = t.optReminderNone;
        renderManualShifts();
      }

      function getPromptText(name) {
        if (imageMode === "kronos") {
          return lang === "es"
            ? `Analiza esta imagen de la app Kronos de Costco que muestra mi horario de trabajo.\nDevuelveme UNICAMENTE un JSON valido con este formato exacto, sin explicacion ni texto extra:\n\n{\n  "period": "M/DD/YY - M/DD/YY",\n  "shifts": [\n    {"date": "YYYY-MM-DD", "start": "H:MMX", "end": "H:MMX", "hours": "N.NN"}\n  ]\n}\n\nDonde X es A o P (AM/PM).\nEl campo "period" debe ser el rango de la semana visible, formato "M/DD/YY - M/DD/YY".\nIncluye TODOS los turnos visibles. Cada turno es una entrada separada.\nIgnora entradas duplicadas o que digan "System Calculation Only".\n\nAbre en: https://claude.ai`
            : `Analyze this Costco Kronos app screenshot showing my work schedule.\nReturn ONLY a valid JSON in this exact format, with no explanation or extra text:\n\n{\n  "period": "M/DD/YY - M/DD/YY",\n  "shifts": [\n    {"date": "YYYY-MM-DD", "start": "H:MMX", "end": "H:MMX", "hours": "N.NN"}\n  ]\n}\n\nWhere X is A or P (AM/PM).\nThe "period" field should be the week date range visible, format "M/DD/YY - M/DD/YY".\nInclude ALL visible shifts. Each shift is a separate entry.\nIgnore duplicates and entries that say "System Calculation Only".\n\nOpen at: https://claude.ai`;
        } else {
          return lang === "es"
            ? `Analiza esta imagen de un horario de Costco y extrae SOLO los turnos de "${name}".\nDevuelveme UNICAMENTE un JSON valido con este formato exacto, sin explicacion ni texto extra:\n\n{\n  "period": "M/DD/YY - M/DD/YY",\n  "shifts": [\n    {"date": "YYYY-MM-DD", "start": "H:MMX", "end": "H:MMX", "hours": "N.NN"}\n  ]\n}\n\nDonde X es A o P. El campo "period" es el Time Period de la parte superior (ej: "3/02/26 - 3/08/26").\nSi un dia tiene dos bloques de horario incluyelos como entradas separadas en shifts.\n\nAbre en: https://chatgpt.com o https://claude.ai`
            : `Analyze this Costco schedule image and extract ONLY the shifts for "${name}".\nReturn ONLY a valid JSON in this exact format, with no explanation or extra text:\n\n{\n  "period": "M/DD/YY - M/DD/YY",\n  "shifts": [\n    {"date": "YYYY-MM-DD", "start": "H:MMX", "end": "H:MMX", "hours": "N.NN"}\n  ]\n}\n\nWhere X is A or P. The "period" field is the Time Period from the top of the image (e.g. "3/02/26 - 3/08/26").\nIf a day has two time blocks include them as separate entries in shifts.\n\nOpen at: https://chatgpt.com or https://claude.ai`;
        }
      }

      function updatePrompt() {
        const name = document.getElementById("employeeName").value.trim() || "Diaz, Juan";
        document.getElementById("promptText").textContent = getPromptText(name);
      }

      function fixQuotes(str) {
        return str.replace(/[\u201c\u201d]/g, '"').replace(/[\u2018\u2019]/g, '"');
      }

      function parseTime(timeStr, refDate) {
        timeStr = timeStr.trim().toUpperCase();
        const ampm = timeStr.slice(-1);
        const timePart = timeStr.slice(0, -1);
        let [hour, minute] = timePart.includes(":") ? timePart.split(":").map(Number) : [parseInt(timePart), 0];
        if (ampm === "P" && hour !== 12) hour += 12;
        if (ampm === "A" && hour === 12) hour = 0;
        const d = new Date(refDate);
        d.setHours(hour, minute, 0, 0);
        return d;
      }

      function toIcsDt(dt) {
        const pad = (n) => String(n).padStart(2, "0");
        return `${dt.getFullYear()}${pad(dt.getMonth() + 1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
      }

      function mergeShifts(shifts) {
        const byDate = {};
        for (const s of shifts) {
          if (!byDate[s.date]) byDate[s.date] = [];
          byDate[s.date].push(s);
        }
        const merged = [];
        for (const day of Object.keys(byDate).sort()) {
          const dayShifts = byDate[day];
          const refDate = new Date(day + "T00:00:00");
          const starts = dayShifts.map((s) => parseTime(s.start, refDate));
          const ends = dayShifts.map((s, i) => {
            let e = parseTime(s.end, refDate);
            if (e <= starts[i]) e = new Date(e.getTime() + 86400000);
            return e;
          });
          const earliestStart = new Date(Math.min(...starts));
          const latestEnd = new Date(Math.max(...ends));
          const totalHours = dayShifts.reduce((a, s) => a + parseFloat(s.hours), 0);
          merged.push({ date: day, startDt: earliestStart, endDt: latestEnd, hours: totalHours.toFixed(2) });
        }
        return merged;
      }

      function buildIcs(shifts) {
        const t = T[lang];
        const merged = mergeShifts(shifts);
        const now = toIcsDt(new Date()).replace(/T/, "") + "Z";

        // Weekly totals
        const totalWeekHours = merged.reduce((a, s) => a + parseFloat(s.hours), 0);
        const totalWeekDays = merged.length;

        // Options
        const location = document.getElementById("locationSelect").value;
        const reminderMinutes = parseInt(document.getElementById("reminderSelect").value);
        const includeWeekly = document.getElementById("weeklyToggle").checked;

        let events = "";
        for (const s of merged) {
          const uid = "costco-" + s.date + "-" + Math.random().toString(36).slice(2);

          // Build rich description
          let desc = `${t.descShift}\\n`;
          desc += `⏱ ${t.descHours}: ${s.hours} hrs\\n`;
          if (includeWeekly) {
            desc += `📅 ${t.descWeekTotal}: ${totalWeekHours.toFixed(2)} hrs (${totalWeekDays} ${t.descWeekDays})`;
          }

          let eventLines = [
            "BEGIN:VEVENT",
            `UID:${uid}`,
            `DTSTAMP:${now}`,
            `DTSTART:${toIcsDt(s.startDt)}`,
            `DTEND:${toIcsDt(s.endDt)}`,
            "SUMMARY:Costco",
            "COLOR:grape",
            "X-APPLE-CALENDAR-COLOR:#8B008B",
            `DESCRIPTION:${desc}`,
          ];

          if (location) {
            eventLines.push(`LOCATION:${location}`);
          }

          if (reminderMinutes > 0) {
            const triggerHours = reminderMinutes / 60;
            const triggerStr = Number.isInteger(triggerHours)
              ? `-PT${triggerHours}H`
              : `-PT${reminderMinutes}M`;
            eventLines.push(
              "BEGIN:VALARM",
              "ACTION:DISPLAY",
              `DESCRIPTION:${t.descShift}`,
              `TRIGGER:${triggerStr}`,
              "X-WR-ALARMUID:" + uid + "-alarm",
              "END:VALARM",
              "BEGIN:VALARM",
              "ACTION:EMAIL",
              `DESCRIPTION:${t.descShift}`,
              `TRIGGER:${triggerStr}`,
              "END:VALARM"
            );
          }

          eventLines.push("END:VEVENT");
          events += eventLines.join("\r\n") + "\r\n";
        }

        return [
          "BEGIN:VCALENDAR",
          "VERSION:2.0",
          "PRODID:-//CostcoSchedule//EN//",
          "CALSCALE:GREGORIAN",
          "METHOD:PUBLISH",
          events.trim(),
          "END:VCALENDAR",
        ].join("\r\n");
      }

      function periodToFilename(period) {
        return "costco_" + period.trim().replace(/\//g, "-").replace(" - ", "_") + ".ics";
      }

      function showError(msg) {
        const el = document.getElementById("errorBox");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("successBox").style.display = "none";
        document.getElementById("preview").style.display = "none";
      }

      function showSuccess(msg) {
        const el = document.getElementById("successBox");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("errorBox").style.display = "none";
      }

      function generate() {
        const t = T[lang];
        document.getElementById("errorBox").style.display = "none";
        document.getElementById("successBox").style.display = "none";
        document.getElementById("preview").style.display = "none";

        let shifts, period;

        if (inputMode === "manual") {
          if (manualShifts.length === 0) { showError(t.errNoShifts); return; }
          shifts = manualShifts;
          period = "costco";
        } else {
          let raw = document.getElementById("jsonInput").value.trim();
          if (!raw) { showError(t.errEmpty); return; }
          raw = fixQuotes(raw);
          const match = raw.match(/(\{[\s\S]*\}|\[[\s\S]*\])/);
          if (match) raw = match[0];
          let data;
          try { data = JSON.parse(raw); }
          catch (e) { showError(t.errJson + e.message + t.errJsonHint); return; }
          if (Array.isArray(data)) { shifts = data; period = "costco"; }
          else { shifts = data.shifts || []; period = data.period || "costco"; }
          if (!shifts.length) { showError(t.errNoShifts); return; }
        }

        const icsContent = buildIcs(shifts);
        const filename = periodToFilename(period);
        const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);

        showSuccess(t.successMsg + filename);

        const DAYS = lang === "es" ? DAYS_ES : DAYS_EN;
        const MONTHS = lang === "es" ? MONTHS_ES : MONTHS_EN;
        const merged = mergeShifts(shifts);
        const totalWeekHours = merged.reduce((a, s) => a + parseFloat(s.hours), 0);

        // Weekly summary pill
        const summaryEl = document.getElementById("weeklySummary");
        summaryEl.textContent = `${t.weeklyLabel} ${totalWeekHours.toFixed(2)} hrs`;

        const list = document.getElementById("shiftList");
        list.innerHTML = "";
        for (const s of merged) {
          const d = new Date(s.date + "T00:00:00");
          const label = `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
          const fmt = (dt) => {
            let h = dt.getHours(), m = dt.getMinutes(), ap = h >= 12 ? "PM" : "AM";
            h = h % 12 || 12;
            return `${h}:${String(m).padStart(2, "0")} ${ap}`;
          };
          list.innerHTML += `<div class="shift-item"><span class="shift-day">${label}</span><span class="shift-time">${fmt(s.startDt)} – ${fmt(s.endDt)}</span><span class="shift-hrs">${s.hours}h</span></div>`;
        }
        document.getElementById("preview").style.display = "block";
      }

      function copyPrompt() {
        const text = document.getElementById("promptText").textContent;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById("copyPromptBtn");
          btn.textContent = T[lang].copiedBtn;
          btn.classList.add("copied");
          setTimeout(() => {
            btn.textContent = T[lang].copyBtn;
            btn.classList.remove("copied");
          }, 2000);
        });
      }

      // Init
      document.documentElement.setAttribute("data-theme", theme);
      updateThemeIcon();
      applyTranslations();
      updatePrompt();
    </script>
  </body>
</html>
